name: Build MeowCity Math

on:
  push:
    paths:
      - 'games/meowcity/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install SDK dependencies
        run: |
          python -m venv env
          source env/bin/activate
          pip install -r requirements.txt
          pip install -e .

      - name: Run simulations
        working-directory: games/meowcity
        run: |
          source ../../env/bin/activate
          python run.py

      - name: Find output files
        run: |
          echo "=== All .zst files ==="
          find . -name "*.zst" 2>/dev/null
          echo "=== All index.json ==="
          find . -name "index.json" -path "*publish*" 2>/dev/null
          echo "=== All lookUpTable files ==="
          find . -name "lookUpTable_*" 2>/dev/null
          echo "=== All publish_files dirs ==="
          find . -name "publish_files" -type d 2>/dev/null

      - name: Upload Math Files
        uses: actions/upload-artifact@v4
        with:
          name: meowcity-math
          path: |
            **/publish_files/index.json
            **/publish_files/*.jsonl.zst
            **/publish_files/lookUpTable_*.csv
          if-no-files-found: warn
          retention-days: 30
